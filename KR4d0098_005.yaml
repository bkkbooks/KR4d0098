body:
  text: 畫墁集卷五宋張舜民撰賦題跋論長城賦并引甲戌之嵗豫被詔出使馳驅王路行次懷柔之北得古長城焉因感而賦之固以涉獵古今亦兼風戒之意云豫昔逰驪山之上得靈臺之遺基今過燕山之下見長城之故址自非逹觀安能齊萬物而一指豫本儒者未免非非而是是竊嘗聞長城之役不獨在秦而已燕趙啓其前始皇繕其後西首臨洮東被于海實萬有餘里我今所見如東海之一波泰山之一簣西望之而不極東循之而無際停驟緩轡獨立而喟徒觀其隱若壞塜屹若長隄荒煙蔓草日落風凄豐狐之窟屢昜狡之徑多迷下有朽骨旁有斷杵曽未知何鄉之人誰氏之子非閭左之丁男則關東之獄吏當是時也蒙恬章邯之方造陳勝項籍之未起爾胡不採芝於商洛山中種桃於武陵溪裏飬浩餐和長生久視胡為乎顔色枯稿形容憔悴之如此也其後百有餘嵗孝武皇帝閔平城之厄憤冒頓之書赫然發怒慨然下詔奮然興師斥單于於大漠之北開亭障置烽燧出長城於千里之外此非城之功又數百年外敵擾境邊馬飲江氊裘被于河洛鳴鏑鬬于上林此非城之罪及乎周隋至於唐晚亦我出而彼入將屢勝而屢敗莫不火滅煙消土崩瓦解瓶罄罍恥亡蹄在城若有知應為感慨方今遐方面內百蠻冠帶指乾坤之闔闢以為門户盡日月之照臨以為經界戴白之老不識兵革垂髫之子盡知禮節庶矣富矣震盈豐大求之古先莫與京對在昜有之萃以除戎器戒不虞既濟曰君子思患而豫防之儒館老生稽首再拜不敢多陳伏願聖神念斯文而為戒火宅賦并引直言之不能信故借外而諭之正理之不能奪故指物而譬之孔子謂能近取譬為仁之方孟軻書大抵以譬喻入人故曰仁人之安宅義人之正路釋氏書有火宅舉是皆欲誘人而之於善也豫竊韙之故為之賦云仁宅不能入火宅不能出聚五藴之幻材依三界而建立其宅朽故土穿木蠧雖樂居處實同暴露寢食燕安不覺不悟哆大矜華誇髙逞富金玉滿堂簮組成行珠櫳璧房冬溫夏涼地控水陸路直康莊賔客候門趦趄傍徨執侍番輩坦腹在牀攩㧙挨抌婢僕強梁騰踔􅞂轢車攻馬良耳瞶絲竹鼻饜羶薌口爽滋味體倦衣裳朝醒暮酗旦取夕忘三槐九棘卵翼揄揚外姻甥舅許史金張門可炙手室如探湯春來秋去其樂未央檀槐改而不舉回祿監而不禳以致寶臺灑熄武庫騰芒城門煙壒宣榭熒煌閔池魚之亡及略廄馬之或傷客無商丘姚光之賢術靡樊英郭憲之長不取淳于之前識寧免牧子之後殃而况名薪積而如山利膏流而如川五欲槖籥三塗熾然火自心起倐爾大作肇本中除次及堂筵鄰里奔迸雞犬攀緣鬱勃赫曦芬輪轉圜煙􅝙彗天煨燼沸泉千雷隱轔萬電回旋風摶羊角雨灑蝸涎凌為流星散作燎原十里避熱百里聞羶當是時也巢居飛揚冗居深藏或爇毛而殺羽或跳竈而乘墻各奏生路安能緩步已半生而半死猶或散而或聚頭角峥嶸腹腸回互䶥掣睢盱睚眥嘷吠魋夔蹲踞鷹鸇拗怒吮血含腥飲膏抉乳或閧或潛一啄一顧又有狐狼野干焦頭爛額成輩而出鼠竊狗盜廋形匿影投隙而入或祛篋而半焦或探囊而全濕莫不幸災樂禍乘危利急厥有居士覩此擾攘迫迮之勢閔茲愚迷顛倒之徒內外慈悲作念思惟我有膂力一身已出顧彼兒女火來迫身寂復不知貪著戲弄東走西馳亦復不知何者為火何者為宅無憂無怖孰安孰危我當作計誘而出之於是飾以三車列於門外惟羊鹿牛照耀行路兒女見之喜恱爭取一時走出列於通衢露坐清涼安穩快樂得免斯難隨力而受乘此三車而出三界噫嘻此乃聖賢方便善巧譬喻之説也居士三車則佛之慈力也火宅兒女則三界衆生也此理非有非無非實非虛儻言其無終日嗟吁儻言其有故不出走是以火宅雖苦出之者少三車雖樂乘之者稀凡百君子勉而再思不可不知吾是以區區而賦之云爾題懷素歸田賦跋張平子歸田賦懷素草書雍熙間內出此書俾再裝褫工人以絹本進入自取其紙本以售於人久之流傳士人家既歸於我然筆墨自如無間淄澠嘗思古之為書自二王已還厯數百年寂無知名者至唐以太宗好書故歐陽虞禇同時而幾過之逮唐之末世以書名家者多矣然皆不能過貞觀以歐虞為師祖獨二張草書見於開元天寶間較其嵗月前自張伯英以至今日千五百年莫能繼者亦可謂之豪傑矣中間以文章知名含華咀英馳騁今古者不可勝數何獨至於書而其吝若此哉歐陽虞禇若二張皆吳楚人天之宰物又不可得致詰也題仲芮家藏四畫右宗室仲芮以名畫數種示豫且俾豫為書子何足以知之姑發而觀焉其一大李將軍桃源圖其二南唐李主雪鵲雪雀其三鍾隱鵪隼其四徐熙牡丹桃花富哉一時之竒工美迹也二李見於總章咸亨之間始為山水畫乃群工之祖也纎繁藴密間以仙靈雲闕羽衣煙霞縹眇龍虎花竹無物不具有長春不夜之景後世俗工非獨不能為亦不知其學也張彥逺畫記云每作一畫必先起草按文揮灑今之畫工固無是事也李主天資多藝書本鍾索畫法韋畢筆力遒徑若聚針鐵故議者謂殆不類其為人惜乎拙於大而工於細觀之使人嘆息鍾徐之迹度越前人得其一技足以為貴上好下甚風之使然夫是數物者其工可謂精矣二李之迹固不可及如鍾徐輩才百餘年亂色雖多不復有一人相似者亦可怪也何絶絃投斧之遽耶技固如是况為道者乎斫輪之歎方信於古人學步之尤尚希於來者題姚氏家藏畫今日姚熙州出衆畫惟老子一幀最為竒古晉人筆也老子牀坐從者三四皆土形木質神王如金精玉彩固神仙人也其次徐熙花今之畫花者多矣茍取一花並張之形色皆奪所謂婢對夫人也又有孫知微五星近世之竒筆也為仙佛者略使之無酒肉氣已足尚矣今人畫仙佛惟要紅紅白白乃是世間富貴之士非神仙之質也俗人執筆必為俗狀以賈俗人授售之間彼此各不知或有淄澠則人舉非之吁百年之後當有鑒者易論妙萬物而為言者道也妙道而為言者元也天地之大不能加於道道之妙不能加於元仰觀而俯察探往而知來天地之藴不能逃也故曰不能加於道道有善惡大小隨世汚隆並遊於君子小人之間故曰不能加於元元也者道之宗萬物之祖引乎百世之上不能見其端反乎百世之下不能齊其末始而非始以其有終也一而非一以其墮數也非精非氣非指非馬天所以行四時地所以出萬物人所以正性命老氏曰無名天地之始有名萬物之母無名者元之謂也有名者道之謂也無名者不可名也古之聖賢擬諸形容象其物宜者多矣至於此不可以名言雖不能名而顧藏身利用在其中得之即生失之即死其為主也大矣乾之彖曰大哉乾元萬物資始乃統天坤之彖曰至哉坤元萬物資生萬物可資也所謂資之以始資之以生者果何物哉故其探幽而識顯察微而知彰見明則仰之以日月履潤則俯之以江河見資生則知其地力也又烏觀其資始之功哉始不可見况於元乎老氏之言道猶曰恍惚杳冥精物也雖聖人之言易姑曰元而已又曰乃統天兹義至大使學易者洗心而求之由是知元者聖人之賾也亨利貞百姓與能焉故彖曰大哉乾元萬物資始乃統天雲行雨施品物流行者天之化也能統天之化者惟元乎大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧凡此皆亨利貞之功也先立乾元之功次言三德之效終著人物之性萬物皆有性性其情者惟君子能之窮理盡性以至於命者惟聖人能之如下文乾元者始而亨者也利貞者性情也互為體用矣文言曰元者善之長也又曰君子體仁足以長人善之長况天道也體仁足以長人况君道也亨者嘉之會也又曰嘉會足以合禮嘉會者時也合禮者朝廷鄉黨之事也君明臣良化行於上而格於下天下無犯非禮三代之盛皆是也利者義之和也又曰利物足以和義凡言利者有徇焉爾徇利而忘義則爭端作惟義之所以為利者先義而主和先義則利物也主和則天下莫能與之爭湯武是也貞者事之幹也又曰貞固足以幹事自無名而至有事其漸可知已幹大患濟大難惟堅貞幹固者能之參之以權挾之以霸危而克存顛而克扶皆可也期於濟事而已復何嫌哉故孔子文言不以乾加元直曰元者善之長明雖乾之大不能加於元用之周不能亢於體故曰乾元用九天下治也又曰乾元用九乃見天則前言用九天德不可為首此言乃見天則申明用九之義也孔子於乾之六爻三復重言之聖人之意深矣夫天下之勢陽乘隂尊臨卑賢役愚此理之常也兩貴者則不能相事兩賤者則不能相使彼乾陽物也九陽數也以陽用陽則孰為受制以貴事貴則孰為祗役故必以乾元乃可用九九既為用則天下之法較然可見也孰為天下之法則用九天德不可為首是也其功如是彼亨利貞者疇敢往參焉然雖不若元之用九其與有功焉皆由此出矣王弼曰治衆以寡制動以靜又曰大衍之數五十其用四十有九其一不用者以無者為之主也無者為之主則有者為之用皆此義也卦具四德者有七乾坤屯隨臨旡妄革也坤之利牝馬屯之利建侯至於諸卦各因其德惟乾不言所利孔子曰乾始能以美利利天下不言所利大矣哉以言天之道無所不利也屯者有雲雷無膏澤隂陽始交而難生動乎險中難保乎全濟也君子於是經綸焉隨説以動而天下皆隨天下皆隨未明乎正邪也必大亨以正乃可也臨至於八月有凶七月隂陽均八月陽衰而隂盛故曰至於八月有凶然下有剛果之臣上有知臨之君陽有進長之象故曰消不久也旡妄天體在上不與物相接在下者可以妄矣或有剛而動者內為之主物是以不敢妄故曰非正有眚物與旡妄革以象成者也已日乃孚然後元亨利貞悔亡然初無四德者安能致信於民而無悔哉徒信其成事而不見其四德之固有也革與暌同體而暌不具四德者以柔進而上行柔進而上行所以小事吉也革與天地四時同德湯武同功異乎暌矣王弼曰凡卦具四德者則専以勝者為先故曰元亨利貞也其有先貞而後亨者由於貞也容有亨利貞先於元者乎弼之此論未為確也然常究之卦具四德者必從曰大亨以正四德者本也大亨正者事業也本原其始也事要其終也聖人行法如是所期事遂而逺災保常而免咎舍此則凶吝隨之矣凶悔吝不能免亦何有易
