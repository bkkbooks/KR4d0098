body:
  text: 提要畫墁集八卷别集類二宋臣等謹案畫墁集八卷宋張舜民撰舜民字藝叟自號浮休居士邠州人中進士第以司馬光薦為監察御史徽宗時進吏部侍郎旋以龍圖閣學士知定州改同州坐元祐黨謫楚州團練副使商州安置復集賢殿修撰卒事蹟具宋史本傳舜民為人忠厚質直慷慨喜論事葉夢得巖下放言稱其尚氣節而不為名北宋人物中殆難多數其初從髙遵裕西征靈夏無功而不還舜民作詩有靈州城下千枝柳總被官軍斫作薪及白骨似沙沙似雪將軍休上望鄉臺之句為轉運判官李蔡所奏謫監彬州酒稅其後起為臺官浸至通顯而議論雄邁氣不少衰崇寧初又以謝表譏謗坐貶朝公武稱其文豪縱有理致最刻意於詩晚作樂府百餘篇自序云年踰耳順方敢言詩百世之後必有知音者其自矜重如此周紫芝太倉稊米集有書舜民集後一篇稱世所歌東坡南遷詞回首夕陽紅盡處應是長安二語乃舜民過嶽陽樓作又舜民題庾樓詩有萬里秋風吹鬢髮百年人事倚䦨干之句世或載之東坡集中蓋由其筆意豪健與蘇軾相近故後人不能辨别往往誤入軾集也文獻通考載舜民畫墁集一百卷奏議十卷周紫芝謂政和七八年間京師鬻書者忽印是集售者至填塞衢巷事喧復禁如初而南渡後又有臨川雕本浮休全集蓋其著作在當日極為世重而自明以來久佚不傳惟永樂大典尚間載之計其篇什雖不及什之一二然零璣斷璧倍覺可珍謹搜輯排比釐為八卷用存崖略其郴行録乃謫監酒稅時紀行之書體例頗與歐陽修于役志相似於山川古蹟往往足資考證今亦並附集末焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
