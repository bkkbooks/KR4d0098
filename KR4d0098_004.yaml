body:
  text: 畫墁集巻四宋張舜民撰詩月臺明月光常滿使君罇屢開何須待月上日暮便登臺宴橋上橋上置杯盤可容十客坐遊人撐小艇却從橋下過呉山堂楚客對吳山歸心常自苦守土切須防半夜俱飛去嶽麓寺初投旱海戈忽整瀟湘枻彭蠡鏡中行洞庭天外倚携杖溪邊聽抱琴臺上坐我喜見江山江山愁見我卧治齋詩為治固有術公卧有人立直須𦂳閉闗勿使龎公入濟川堂河流便當城峻嶺借為屏疑在金山寺憑欄看北泠為圃前人厭膏粱志欲服賤事若論區别功為圃亦不易過魏文貞公舊莊破屋居人少柴門春草長兒童不識字耕稼鄭公莊邠詩人張谷齊物先生馳名京師四方晚隠于終南山黄池谷陜右多畫為醉仙因贈繪者能吟解飲張夫子醉卧黄池谷口風天地至寛容不得勞君收入畫圖中長干寺同劉宫苑浴人看浴出如枯木我自無心類死灰在處秋風吹鬢髮不堪更上雨花臺未知何處是吾廬南北悠悠意所如不愛渭川千畝竹與君江上卜新居繡鶴竹好客精神來萬里此君風格聳雙枝丹青絶筆真難得不似佳人粉錦時弔太白采石山頭秋月明姑熟堂下秋水清可恨世人皆捉月如何偏解溺先生登樓繁華盖盡一時間烟雨濛濛氣象閑今日登臨何所似慈恩塔上望南山起桅百尺桅檣一尺烏一夫擊皷百夫呼何似北人將逺適呼童秣馬與膏車元豐癸亥秋季赴官郴嶺艤舟樊口與潘彦明范亨父以小艇過吉陽寺是日大風雨雪江上秋風九日寒故人樽酒暫相歡如何塞北無窮雪却坐樊山竹萬竿下灘二絶句下得寒灘水漫流山平水逺更清幽幾何舟楫隨風去唯有漁人得自由江風淅淅似相催緑竹丹楓去又來任使雲帆能破浪不知歸客已心灰望子嶺梅花方開用黄道韻木海亭前花似錦嶺頭梅蘂怯風沙正如隠者歸幽谷鶴版徵書未到家杜城茅齋二首已分長招湘水魂安知却返杜陵村陸居無屋舟無水坐看南山飛白雲多謝村人亮素貧墻垣雖設不闗門一杯藜粥茅亭上卧看南山飛白雲均州南川春日三首水墨屛風逺近開人煙隠映水環回何人學得愚公術故意移將灞滻來麻葉梢梢麥弄風一家花發一村紅長安兒女逢寒食灑淚看花正憶翁宦名生事日悠悠問道㕘禪已白頭自笑攀縁猶未斷每逢佳處即遲留薄臺臺在富文縣南漢文帝母薄太后所居屈曲清溪十里長浄涵天影與秋光此行却在樊川尾稻熟魚肥柿子黄僕射陂陂頭下馬問漁者欲買鮮鱗充晩庖昨夜北風水面合不禁楊柳已成苞和麟遊王令雪中見憶麟遊小雪近家山歸思連雲不可攀珍重嵗寒惟白檜忽飄幽韻到人間九成宫有唐初白檜和吕與叔觀耤田三絶南薰門外禾千畝觀稼亭前柳四垂茭芡滿盤新熟酒年年妝㸃早秋時奉常别後青衫窄刺部歸來白髮多眼看湯孫宜黍稌愧無才力繼猗那城中車馬已諠諠竹下髙人尚晏眠倚道公門少還往可能時到野塘前書陳副省卷乃翁能繼輞川吟零落傳家得至今貧賤莫量陳孺子與人千古作知音寄陸彦回同年忍從多難生華髮枉被髙談敝黒貂策馬又從闗塞去空將回首戀中條燕山聞杜鵑曉色千峯杳未分聲聲哀怨出雲根舉頭忽見思鄉嶺何不他時别處聞圓覺院聞杜鵑秦川渺渺楚天長血色山花哭斷腸謝汝慇懃苦相勸如今倦客已還鄉哀王荆公門前無爵罷張羅𤣥酒生芻亦不多慟哭一聲唯有弟故時賓客合如何鄉閭匍匐茍相哀得路青雲更肯來若使風光解流轉莫將桃李等閒栽去來夫子本無情竒字新經志不成今日江湖從學者人人諱道是門生江水悠悠去不還長悲事業典刑間浮雲却是堅牢物千古依棲在蔣山哀虢縣令猶子箅種𤓰再摘覺𤓰稀不為衰年骨肉離何事一哀還不哭老人相别不多時艱生數寸得能孤滿望亭亭百尺餘霜雪未零摧折去不材何用腹心枯跋范寛小景魏泰所藏對鏡傳神了不殊峴山黄落數峯孤既能咫尺成千里何必吾家十幅圖題趙大年小景生長深宫不識山騷人一見便開顔分明記得經行處青草湖邊第幾灣題趙大年奉議小景渭曲山陰到者稀浮休一見便開眉客來不必多嗟賞自古詞人是畫師西征回途中二絶靈州城下千株柳總被官軍斫作薪他日玉闗歸去路將何攀折贈行人青銅峽裡韋州路十去從軍九不回白骨似沙沙似雪將軍休上望鄉臺自題畫扇忽忽南遷不記年二妃祠外橘洲前眼昏筆戰誰能畫無奈霜紈似月圓題薛判官秋溪烟竹深墨畫竹竹明白淡墨畫竹竹帶烟髙堂忽爾開數幅半隠半見如自然贈山人張無惑善畫山水西征已度故闗山秋雨零零路屈盤受盡艱辛心不足解程又展畫圖看九日一見黄花只自羞蕭然短髮不禁秋誰人為整烏紗帽獨倚西風滿眼愁酴醿冰肌雪豓映殘春燠日薰風入四鄰任是主人能愛惜也拚一半與逰人真珠花風中的皪月中看解作人間五月寒一似漢宫梳洗了玉瓏璁壓翠雲冠詞癸亥陳和叔會于賞心亭江神子七朝文物舊江山水如天莫憑欄千古斜陽無處認長安更隔秦淮聞舊曲秋已半夜將闌争教潘鬢不生斑歛芳顔抹么絃須記琵琶子細説因縁待得鸞膠腸已斷重别日是何年清遐臺餞别朝中措三湘遷客思悠哉罇俎定常開雲雨未消歌伴山川忍對離盃他年來此賢侯未去忍話先回好在江南山色恁時重上髙臺題岳陽樓賣花聲木葉下君山空水漫漫十分斛酒歛芳顔不是渭城西去客休唱陽闗醉袖撫危欄天淡云閑何人此路得生還回首夕陽紅盡處應是長安
