body:
  text: 畫墁集卷二宋張舜民撰詩梅子月破冥冥雨枝搖閃閃黃口中先水出衣上帶花香肺疾須拚醉牙疏不耐嘗調羮無復用山谷日傾筐巖花託根何太逺得地亦相宜土石生為偶紅香想自知風英將片片雨實漸離離戍客思攀折無何厯處危矴齊獨懷兄弟並橋冰乍泮隔岸柳初黃河上春猶淺天涯日漸長平時好行樂往事入思量最恨三年别應添兩鬢霜東行别矴齊詩宴坐豈不好有誰强爾行山川不改色兒女若為情岸隔霜林意齊空夜水聲虛傳少陵叟一室過生平秋日書懷凉風起天末何物動人愁一室關河暮三年草木秋髙文誰弔屈晚節漫依劉獨怪瀼西叟巴江得久留秋暮書懷秋日平凉客棲遲泮水間家貧思得祿性懶要長閒欹枕時聞雁登城忽見山征西舊時將大半髮毛斑客舍無前後分明似一舟瓶罌生計小兒女長年憂糊口身將老謀歸嵗聿周布衣今復敝莫問黑貂裘憶昔曾遊處俄經二十年重來人不識獨想事依然北海知劉備荆州小仲宣如何騎駿馬徼幸學開邊濯濯荒山麓娟娟孤女祠曉泉開寶鏡秋月畫蛾眉拾翠來涇汭行雲過北池猶勝青冢魄埋恨九原悲旅鬢莖莖白霜梨葉葉紅可憐非類者同落有涯中萬物齊為馬勞生獨轉蓬此行江海外便作狎鷗翁再到崆峒寺題名尚宛然存亡如昨日筋力想當年禍福歸元鸐晨昏聽杜鵑此間無虎豹好著養生編節物推移速登臨感慨多寒雲飛隴首殘葉下朝那代北慚歸馬洮西尚凱歌惟憐鏖戰骨寂寞掩山阿冶谷鴉仍亂空同日欲曛關河圍絶壁鼓角壯中軍自納和戎策還停草檄文征西好規矩後世見忠勤愛靜無由靜思歸不得歸干時虛碌碌懷往回依依菊酒還吹帽元霜未授衣知他蘧伯玉曾悟少年非登大岯東郡韓延夀黎陽李魏公一時推豈弟纍代想英雄草木芳菲外山河感慨中但逢川上客不見狎鷗翁離山陽日日東南去空勞北望魂孤帆轉城角返照入船門强飯甘魚菜隨方學語言蛙聲不忍聽為似故山村八月十四日清溪堂望月客路三湘逺天風八月清雲間雖掩映水底已分明且對當年影休吟萬古情喜君方向滿照我過江城郴州送許叔獻員外赴道州許在江淮間講學甚久嶺下為遷客人中得老成傳經漢丞相授講魯諸生五斗青衫色三湘白髮莖話言猶未盡要作道州行順陽已免均房險寬平喜博山園林皆掩映風俗自安間麻麥三春暮人烟百里環吾行半天下難得此江關隱隱來山逺茫茫去路平舟車楚北户城冢漢南京小杏沾花摘春醪對雨傾士民留我住强作少陵行鞏州首陽鋪鳥鼠同穴本是巢居物那容鼠穴中既言無牝牡何用有雌雄山節曾居蔡長江網得鴻誰能窮物理目送渭波東送鮑經句赴辟洮東幕府平昔通家子今為幕府賓宦遊知幾日器業已成人隴右從戎客燕南老病身軍中想多暇莫惜寄書頻體之推官侍親出使聊書短篇以凂行色遊梁并困洛誰是故人情未盡環中說俄成劔外行路遙詩篋重雪映綵衣明預想東歸日相逢指渭城過同州遇雪贈毋清臣左輔沙如水長春柳未勻精神迎刺史景物為行人羃䍥梁山外飄流洛水濱十年門下客依舊困泥塵花時對雪急霰飄零際羣芳爛熳中半開先逐水未落已隨風兵渡金陵破塵來繡嶺空誰能勞樽酒暫使客顔紅西宫致齊貽裴著作西出都門外塵埃撲馬鞍人家事寒食星雨仰祠官日永鶯千囀庭間竹數竿唯憐隔齊禁不得共清歡南衙寺㑹宿王鮑二同年遍走長城塞歸由舜阪頭榜中千里駿天外二星流花月仍寒雨關河逼寺樓寧知十年後此地並衾裯組以時果供饋豫以酒為報饉歲無時果秦人饜草茶開奩驚見李對客喜浮瓜為乏瓊瑶報聊稱㫖酒嘉中郎不憂老有女可傳家哀虢縣令猶子箅匍匐岐山下三呼已過時臧孫雖有後伯道竟無兒自是終身痛空留一縣悲老人休雨淚轉靣即逢伊送别言猶在來書墨尚溫安知咫尺地便有死生分已負秋山約猶傳魯史文魂兮今有託將祔伯兄墳蘇子瞻哀辭石與人俱貶人亡石尚存却憐堅重質不減浪花痕滿酌中山酒重添丈八盆公兮不歸北萬里一招魂佚老堂為陶敏宣德題未老剛稱老言休即便休潯陽真有後彭澤善貽謀隱几悲殘漏回頭見急流便須移醉石偃卧北窗幽杜䳌飛伏終難見空摶似老烏一身隨變化故國任丘墟簇簇花如血聲聲怨不枯春山情更好何必夜相呼食楊梅荔枝思去年楊梅味已酸荔枝色能丹大齊驪龍脫江綃玉露團謫居深不負沈醉亦何難今歲無人剝吁嗟任滿盤山果煮酒堆山果新茶下粉團似梅嫌足核如蜜少加酸公子傾金彈行人漏蠟丸吾鄉元不識歸日畫圖看宣赦擊鼓填街道傳聲過水濱國嚴三歲祀恩洗萬方春舟楫隨南斗衣冠拱北辰嶺南并嶺北多少望歸人秋日燕山道中燕山秋更好况復值新晴一徑幽花閙千巖晚瀑明寺危迂路入水漫信船行嘗栗皺初破開梨頰未頳松蘿扶斗上劔㦸插沙平秦趙封疆密岷峨氣象清五龍丹桂盡萬馬蹛林橫韞玉人時得埋錢事可驚畫圖傳輞水醉倒戀增城為報南歸客應須自作程和趙大監雪一首臘雪稱為瑞初春又不同月藏燈市底雲泛綵山中灑面猶堪數連宵勢莫窮催花縈小檻引絮舞低空三徑從誰掃千門倐自通䙰褷消酒力料峭却東風闊壅平戎幕孤撐訪戴篷豈期麟趾客並舍虎門東郢國歌難和梁園賦易工何人知帝力鼓腹頌清衷
