body:
  text: 畫墁集巻一宋張舜民撰詩紫騮馬紫騮馬白面郎紅銀鞍勒青油韁左牽黄犬右擎蒼朝從灞陵獵暮宿投平康使酒不滿意按劔叱天狼今年明年一如此後年不覺髮成霜扶肩䇿杖出門行抱子弄孫樓上坐忽然涕淚滿衣襟為見驊騮面前過闗山月明月生海上裴回照邊城中夜闗山静但聞流水聲征人看月思鄉泣夜久衣單難獨立錦字佳人怨不歸開幃更感飛螢入桃李花紅白桃李花馨香滿芳草開時人少年落處人已老風雨半夜來飄揚滿官道行客為歎息不忍便除掃猶有兩三枝香色晩更好把酒將奈何攀折恨不早二花如桃李人如玉終日看花看不足萬年枝上轉春風七絲絃上調新曲寳馬嘶風車擊轂東市鬬雞西市鞠但得長留臉上紅莫辭貴買尊中醁來日大難去日滔滔似易得來日藐藐若大難一日且作一日調百年莫作百年看晉侯竟爾見新麥楚王更要食熊蹯勿輕白髮翁勿恃青楊質物壯則老矣其夀不可必嵇叔夜郭景純今般人物如何人皇天何不留逡巡君馬黄君馬良乗乗黄僕臣御守法度乍可三驅失前禽不可一朝為詭遇假使四牡項領無害六轡如組周旋中規折旋中矩聽和鸞之聲遵康莊之路馬不駭輿君子安處如欲登九折之險走羊腸之阻䝉犯霜露趺踢風雨雖使造父再生王良復出予亦未知其如何爾大雪行曉辭洛水濱暮宿河之涘四野漫漫不見人竟日止能行數里渾然天地為一色渭水南北復何似五陵鷹犬争合圍十宅管絃初熱耳連宵耿耿照鬢髪迎馬㸃衣猶未已但得來年春麥熟暫困泥塗復何恥農夫南畆未厭多却入長安作泥滓邯鄲少年邯鄲全盛時人物自都雅更得幽并兒豪氣陰相假生求趙王劔千金不論價力購燕國姝臨髙起亭榭使酒叢臺上夜獵西陵下聞說五陵兒臂鷹馳犬馬試院感懐朱户當晝扄霜簾達夜懸沈沈造廣庭皥皥接衆賢疎莛叩洪鐘短綆汲深淵始知學不迨内顧多歉然憶昔居上庠忝出流輩前賦就千金直詩成萬口傳荀揚迥接迹班馬思比肩一從茍干祿永謝英俊躔折腰府縣中餬口道路邊世俗多見輕義士誰哀憐憔悴有今日光輝思昔年今兹覩秋闈猶欲争相先枯魚傍江湖疲馬憶薊燕凉風拂翠幙隴月向人圓物景近中秋客意孤綿綿裴回望清光欲攬不得全永懐懽樂時把酒謝嬋娟鯨魚東海十日風巨浪碎山谷長鯨跨十尋宛轉在平陸雷火從天來砉然刳兩目肌膚煑作油骨節分為屋腥羶百里内户户至厭足我聞海上人明珠可作燭鯨魚復何罪海若一何酷從欲讒風伯大鈞問不告躊躇復歎息歸咎當溟瀆託形天地間獨爾有含蓄大者不能容小者又何益却羨鰕魚輩安然保家族東武二首小白奬周室夷吾致其君各竭當時力未免後儒言駿馬日千里壯士舉百鈞更欲加勉策折髀與摧轅景公登牛山俯闞臨邑區耕耘被廣野軒冕充修衢鬬雞走狗馬擊筑吹笙竽魚鹽來海岱桑柘入青徐饒樂曾無敵棄背復何如公乃歎而泣顧謂諸大夫安得千萬年長有此國都大夫助公泣獻夀猶欷歔晏子歛袂笑笑此君臣愚世事如輪環曾不借須臾前此十數公今已成丘墟胡不長守此乃與子孫居始知富貴者喜受庸人諛豈獨當時笑後世亦揶揄山陽二首山陽水陸衝樂餌人所赴寂寞先生門車輪不少駐賢哉彼二公綽有尚賢風恨不生羽翼嘯歌尊酒中古人急於仕每擇分所安願為趙魏老不作滕薛官今人不量力臨老當繁難少見詠淇澳甚多歌伐檀淮口阻雨己亥吳同年要飲舟次淮口作旱久不得雨既雨不肯休沄沄汴河水初合淮河流北來何處客暫此駐扁舟中有投荒人萬里趨炎洲聽水夜不眠觀水朝亦愁呼風捲重陰放出赤日頭捨舟出平地走馬復西遊天爵山耕者志於食否則餒繼之學者志於道一為好爵縻本自不營利間或與利期朝日入而處暮日仰而思浮雲蔽蔀屋見前當自知李侯新齋植松竹聊為雜言嘗聞君子居一日顧必葺李侯作新齋制度皆自給軒楹如肺腑豁達可出入取竹渭水湄移松隴山隰嵗寒逺相依勁節久孤立栽培豈無法根著至今濕清風在目前獨我得多挹歸壤共無涯往日不可及惟憂屬後人長伴邊聲急送葉伸出使河北君今使河北幾日渡黄河脱身出臺省杖節犯風波東南耆舊中如君能幾何何人把袂留顧我餞則那燕趙多佳人善舞體婆娑不學白紵詞能唱瓠子歌歌罷令翁愁井竈宅黿鼉安得佐禹才干旄飾五紽與君並駕驅坐使民氣和揮汗强援筆矢辭愧不多汧陽感事人誰無婚姻我則分鮮薄即今頭已白不識外家樂再過汧陽縣心境何寂寞當時退食地東軒俯層壑華屋變山丘九原寧可作空存遺愛樹枝葉幾榮落正如遼東歸但見舊城郭堂堂想其儀物物皆如昨眼看北來鴈身是南飛鵲霜風掃隃麋晚翠歛吳嶽臨行更踟蹰灑淚遍南閣思善堂春風長萬物棘子猶卷然及至華實稠已悲霜露先功隨四時去不待三牲全所以陟屺人設身常捨旃鄉人言郴江有竒石似牛伏岸側鄉人久相傳過者有顛覆我與鄉人謀鑿去可勿留祗消一日力得弭千嵗憂鄉人顧我笑官必有闇拙大者不能圖小者安用説方今民閒事頗有急於石當官貴居事能不閑採拾我家本多田今乃身無居雖有兒女輩售人為婢奴破家不足恡所恨骨肉離官今將骨肉好去將何之我雖有田里亦聞官念此念此不能為何用居官爾乃指江中石此物如有神不覆㢘善士獨傾貪虐人官今幸過此行李都無害將我言日思勿為貧賤懈我聞鄉人言背顙俱汗流欲問破家因恐為明者羞送羅正之年兄出使二浙玉麈助清談金貂飾髙位二物已殺身無剥生民利君為使者官猶作農夫事隨軒載畚鍤一心唯度地惟梁及齊岱潢汙變滯穗玉食反無魚黄牛如象貴凡人畏辛苦君處乃樂易富哉太伯墟吳越之委積二年苦昏墊竈臼成蛙肆一日死百人官司但熟視不獲乃命君物議已為遲君其尚勉旃副彼朝廷意若為濬涇洪可得露城市誅其姑息人戢彼因循吏死者不可招存者如何置赴海與壑鄰實繫君之智君家本天台立身頗勤勩一生在州縣晚嵗稱憲使南人重衣錦今爾實自致弭節拜墳墓椎牛設鄉遂翁媪上籬觀揮零復嗟喟咸曰羅家兒今日乃如是伊予出西北仕路每相值交代又同年莫予論事契嗜好無不同出處亦有類天台與四明一生游夢寐澹蕩秋風中都門把歸袂行與興公游閒過賀老醉二客儻有言因風幸相寄送薛昌朝赴太原幕府去國重為客送君還復歸天寒雨細光景促且就東城寺中宿寺當蒲坂望屋廬日暮無由辨喬木既已唯諾難自由雖欲一日安可留吾輩事勢不大殊此際興味復何如歸來愁坐獨嗟吁畢竟豈如村野老或爾富民城郭居雨暘寒􅫥都不與親戚滿眼身不孤乃知平生走薄宦正似癡牛引重車險夷繚絡不知止祗得終年困道塗贈奉議沈遼詩鳬脛天生短鶴脛本來長一朝有客欲斷續二物無地逃悲傷吾徒曾匪鳬鶴匹又取聖賢為學術解將軒冕等浮雲寧免儻來并執一夫君擢秀居東南代以文詞起簪紱錚錚官業素有聞更號能書居第一平生意氣少防閑一跌落在江湖間幾年轉徙無家室唯與樵漁為往還醉吟未免寫胷臆健筆依舊飛雲煙逺俗僻陋多不識都城一帖沽萬錢今朝我過齊山下邀我陟降遊二山羨君卜築思意盡今古氣象羅目前佛留九頂千株石天賜清溪一水灣自拾薪枝給朝夕不與城郭通交闗親友一切皆謝絶惟許子馳來問安人生涉世多憂喜不用昭昭明物理少小辛苦卜一㕓如今老大無居止遷流方從五嶺去敢望生還復經此萬一君恩縱北歸與君左右為鄰里還李彀士雄卷河汾之會韓晉之津在昔王馬今何人青衫木笏排風塵面如桃花髭如銀長篇大字妙入神闗輔後輩誰等倫四方仕宦足邅迍歸老閿鄉玉澗濱雲為友兮山為鄰森森緑槊萬霜筠汩汩清漣飛兩輪亭上何所見荆山早暮來相親齋中何所有新舊歌詩千百首細大搜羅萬象勞放開日月東西走世上兒女徒紛紛作者須教歸老手君不見古往今來富貴人燦燦金章懸紫綬金珠初入寵方深骨肉未消名已朽又不見李杜死來三百年至今仰望如星斗一聫一句挂齒牙便同金石垂長久乃知皇天造萬物獨於吾輩偏加厚還翁詩卷翁細思豈是生平都不偶禪僧福公寄惠牧牛圖答以問牛歌訶訶訶棲巖老法師寄我牧牛頌我是人間百嵗人今朝却作嬰兒弄堪笑其間有一牛滿身變白尾猶黑想君不是上上根教人費盡閑心力我昔有一牛其毛元自白如今牛已無欲求不可得蓑笠與鞭繩同時皆棄擲身心無住著冷坐溪邊石却問山中人閑尋牧牛客書節孝先生事實於先生詩編之後古人往矣名空存爾來冠帶誰其倫語言淵騫行盗跖俯仰不愧何繽繽先生道義完且潔去彼取此非今人事親豈但綵衣戲刻木省定長悲辛抛官卻掃醉經史胷中無復留纎塵履穿袍敝突不墨辭幣與粟甘清貧自從秀髮到白首造次於是非一晨當知有昊憫澆散先生故出拔斯民嗟余稟賦雖不敏管窺偶幸知所因講聞先生亦已久云為輙以書諸紳朅來廣陵兩閲嵗所得比舊又加親此編雅什盈數百覃思成誦驚余神恍如聽樂周太廟黄鍾大吕皦且純又如典瑞出圭璧璀璨溢目非玞珉偉哉固足信萬一髣髴想見容彬彬吾皇圖治急遺逸空谷相望推蒲輪先生髙卧焉得遂細札匪日頒嚴闉重慚韁鎖脱無計灑掃猶阻致此身願言師法不少懈異日有立逃湮淪跋百之詩畫詩是無形畫畫是有形詩丹青不知老將至李陵蘇武真吾師太平本學治禮樂猶有暇日能臨池區中孰最竒龎眉皓首苟住著安得一區我安之京兆安汾叟赴辟臨洮幕府南舒李君自畫陽闗圖并詩以送行浮休居士為繼其後古人送行贈以言李君送人兼以畫自寫陽闗萬里情奉送西安從辟者澄心古紙白如銀筆墨輕清意瀟洒短亭離筵列歌舞亭亭諠諠簇車馬溪邊一叟静垂綸橋畔俄逢兩負薪掣臂蒼鷹隨獵犬聳耳駏驢扶隻輪長安陌上多豪俠正值春風二三月分明朝雨挹輕塵客舍青青柳色新主人舉杯苦勸客道是西征無故人殷勤一曲歌者闋歌者背淚霑羅巾酒閳童僕各辭親結束韜縢意氣振穉子牽衣老人哭道上行客皆酸辛唯有溪邊釣魚叟寂寂投竿如不聞李君此畫何容易畫出漁樵有深意為道世間離别人若箇不因名與利紅蓮幕府盡奇才家近南山紫翠堆烜赫朱門當巷陌潺潺流水遶亭臺當軒怪石人稀見夾道長松手自栽静鎖園林鶯對語密穿堂户燕驚迴試問主翁在何所近向安西幕府開歌舞教成頭已白功名未立老相催西山東國不我與造父王良安在哉已卜買田箕嶺下更看築室潁河隈憑君傳語王摩詰畫箇陶潛歸去來打麥打麥打麥彭彭魄魄聲在山南應山北四月太陽出東北纔離海嶠麥尚青轉到天心麥已熟鶡旦催人夜不眠竹雞呌雨雲如墨大婦腰鐮出小婦具筐逐上隴先捋青下隴已成束田家以苦乃為樂敢憚頭枯面焦黒貴人薦廟已嘗新酒醴雍容㑹所親曲終厭飫勞童僕豈信田家未入脣盡將精好輸公賦次把升斗求市人麥秋正急又秧禾豐嵗自少凶嵗多田家辛苦可奈何將此打麥詞兼作挿禾歌
