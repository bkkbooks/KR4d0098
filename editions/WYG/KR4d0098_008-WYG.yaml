body:
  text: 畫墁集巻八宋張舜民撰郴行録丁已泊鎮岸自入龍峯港趣蘄州四十里港口依山有寺叢翠可愛戊午發蘄口順風瀕東岸行臨岸皆小山培塿可二十里抛西岸可三十里過新野夾上口又五里過道士磯散花洲舟過磯上風勢方急為山所轉帆或倒掩船即囘旋久之方能整行惟此與馬當山有風乃山勢使然也辛酉晴風逆循北岸縴行可十餘里過巴河口北岸无山平曠南岸培塿童禿又十里至菜園步以風止此距黄州五里南岸下江中有石如伏牛曰節度石舟人云或者重載而下此石徃徃觸而覆之謂節度者戒之也壬戌早次黄州見知州大夫楊宷通判承議孟震團練副使蘇軾㑹于子瞻所居晚食于子瞻東坡雪堂子瞻坐詩獄謫此已數年黄之士人出錢於州之城東隅地築磯乃周瑜敗曹操之所州在大江之湄北附黄崗地形髙下公府居民極於蕭條知州㕔事敝陋國朝王禹偁嘗謫此丙寅同蘇子瞻遊武昌樊山山之巔有郊天臺即孫權即位郊天之處食罷移舟離黄州泊對岸樊溪口蘇子瞻以舟涉江同詣武昌縣縣在樊溪之東隔樊山五里許即吳之西都有吳王城同縣令季觀佐吳亮嚴􅗆遊樊山步出西門涉寒溪迤邐上凡兩寺在山中下寺有觀音泉澄澈可愛丁卯㑹食李令射于縣圃蘇子瞻言近獲一魚似鮎而四足能履地而行不敢殺復縱之江中或曰此鯢魚也鄂州城即孫權所創與潤州子城金陵覆舟山城武昌吳王城制作一體皆因山附險止開二門周環不過三二里乃知古人為城欲牢不欲廣也丙子羣㑹登石城最西臨江即黄鶴白雲最東即頭陀寺寺與樓下枕大江對瞰漢陽江中即鸚鵡洲黄祖沉禰衡之所上接湖湘下臨沔漢乃古今絶景也白雲黄鶴樓者取費禕上昇之地仙洞尚存禕始乗白雲而去久之復乗黄鶴而歸也自漢口少南即故漢陽軍軍今廢為縣軍西附城有山渾然獨起即大別山禹貢所謂過三澨至于大別也戊寅陰早率檀宣義逰魏夫人閣觀在廟之西南山􅅢少上半里許據大石作屋規模頗狹閣上為二女人像云麻姑魏夫人也夫人晉魏舒之女故嘗嫁為王氏婦生息男女既而學道升仙列仙自有傳閣前有二石相重上石如荷菌形可半間屋謂之乗雲化石下石如棋盤為上石所壓而破分為二相著處才可數寸下臨溪望之如墜至為危險以椀酌水置之石上一指微按之水即動揺以兩手極力推托水復不動傳云魏夫人與麻姑自麻姑山乘此石飛空而至又云乃所乗之雲及地而化為石也己夘夜雨至旦少霽解舟順風西南行十餘里過五家洲江流兩山之間勢尤偪狹而水急非迅風不可上又五里過雷家步石岸有寺名兠率云韋宙所建庚辰雨雪循岸牽行宛轉二十餘里過思塘鋪有廟曰思唐相公不知為何神也癸未循丁家洲北岸牽行可二十里過昭坎為正南行少間風作西北來勢横揜岸吹使船側可二十里次茅州洑居人云舊無此洑昨六月内一夕無風但水滙所成昨夕丁家洲夜半水發浪崕崩弛舟人云下有蛟蜃所作也然自鄂以南江無完岸丙戌觀萬石船船形制圓短如三間大屋户出其背中甚華飾登降以梯級非甚大風不行錢載二千萬貫米載一萬二千石次岳州日方辰巳間行一百二十餘里見知州大夫黄休晚登岳陽樓即岳州之西門也下湖水北望荆江自西北流東南至岳州城下與湖水合而東流始為大江凡絶湖而南西者趨鼎澧西北趨荆峽一湖之間分此四路也毎嵗十月以後四月以前水落洲生四江可辨餘時彌漫雲涯相浹日月出没皆在其中望水中如覆斗者即君山也岳州西南山勢如覆舟東連衆山而孤絶山之南即石橋港舟行緩急避風之地辛卯登岳陽樓樓有牌極大乃前知州事李觀所記吕洞賓事迹李先知賀州日有道士相訪自言遇呂先生誦過岳州詩云惟有城南老樹精分明知道神仙過始亦不知其由其後李為岳州有白鶴寺僧見過道呂先生題老松詩與道士之言相符吕憩於寺前松下有老人自松梢冉冉而下致恭於呂呂問之為何乃曰某松之精也今見先生過禮當候見因書二絶句於寺前壁間獨自行兮獨自坐無限世人不識我惟有城南老樹精分明知道神仙過又云朝遊百越暮三吳袖裏青蛇膽氣麄三入岳陽人不識醉吟飛過洞庭湖郡人於松下構亭名曰吕僊亭云據圖誌岳陽樓經始於張燕公終唐之世屢圮皆完葺慶厯中滕宗諒謫守始大加增飾規制宏敞甲冠上流取宋梁以来所題詩記刻石于夾樓壬辰羣食於岳陽樓坐客有楊維承議者乃鼎州人能言武陵桃源之事桃源前後上昇者凡六人一洞天二福地桃源觀有二烏自晉太康以来見之馴擾山林中中間改換不可知也然二烏如故其餘烏雀服之每有遊人貴客未及數十里烏已先報之近嵗為人獵去其一即時復有一烏充之天慶觀木柱上有謝仙火三字體兼篆𨽻皆倒書入木至寸筆畫雄勁非人力所能為然莫究其端或云永州何仙姑能道幽隱事因走人具事致問旣還報云此雷部中火神也兄弟三人形質如墨然其長各不過三尺此用鐵筆倒書也旣再使人就書騐之一如所報天慶觀西廡有石刻二詩辭致清婉其道人云至道中有賣墨人儀状雄偉嘗此遊息一日于扉上題詩二絶句而去或云吕洞賓所書也郡人爭刳之以治病今字字刳痕深寸餘而墨跡不滅癸巳次晩洲洲上平廣土壤如北方居人止一兩家自朱洲之西水中處處有三石形如壊塚土人謂之黄牛石出沒水中頗為舟船行人之患過者避之行次晩洲有詩云臈月遭霖雨孤舟艤暮灘數聲歸雁斷半嶺野梅殘無復論偕老何時展急難江湖卧周歳此夕最難安甲午早發岳州自東山又五里許過閣子湖口即㴩湖也爾雅所謂春夏有水冬無水曰㴩也張燕公及幕府題㴩詩甚多在岳陽樓上順風放湖是時冬深水落港浦可辨近東岸向西南行十里許過靈妃廟在東山下水次極望甚逺過扁担山勢如覆舟東連衆山而孤絶上有小塔望之巋然曰啞女塔昔有士人女生數嵗而不能言一日渉湖女見塔即語其父母故名曰啞女塔巴陵以南漁者皆用連網罩水中延袤可一二百歩有如城郭謂之欄灘網過巴溪十里許次鵝洲以風急止鵝洲下丙申陰晦欲雪岸洪宛轉尚未全出湖中午際風微雨作可十五餘里東岸始有人煙曰龍渥水色極深乃湘水也有水自東出曰歸義江口入口十許里餘即汨羅也一水中分南曰汨北曰羅洲上有忠潔侯廟即三閭大夫也東望培塿迤􅆔林薄曰鹿角廵檢司又十餘里西岸有沙洲堆阜隆起即青草廟下有一湖湖之中有此洲南名青草北名洞庭所謂重湖也申後次廟下舟人展賀大率南行至此北行者至廬舟人皆致賀以其萬里江湖至此方保平善也乗舟人當有酒肉之賜廟居洲上南向門内一排三殿中曰勸善大師乃一僧像西曰安流大王東曰昭靈大王中曰勸善即泗州大聖也昭靈馬援也安流者莫知其為誰小碣一乃梁開平中馬殷所建然堂廡頽圮湫隘為甚西殿有一鐡鍋可容五斗許下有木刻龍頭之鍋上有字云准宣鑄利州黑龍船上鐵鍋祝云此二物自川峽流下自湖中泝流至廟也廟外有巡檢司居民十數家以漁釣為業樟木數百株徑數圍遍覆洲上冬青可愛是夜船上不敢打更提舉舟人云廟中自打更報牌也夜深傾聽亦有所聞青草湖旁有朱陵洞亦謂之朱陵仙府有唐人題刻散滿巖上嵗久荒涼至慶厯中因其地建為石鼓書院雖畧為規制然僻在江郊又三冬寒露學者未嘗㳺焉唯守将之好事者嵗時一為登覧燕㳺之地黄陵廟即舜二妃牓曰懿節廟庭宇湫隘竹木蓊鬱二妃並坐傍設舜像馬殷嘗加營葺退之記沈傳師書碑石訛剥更以石模刻之字體多失詩云青草仍殘照黄陵一望中壁書遷客淚簾巻過湖風斑竹痕猶淺蒼梧恨莫窮年年秋水上瑤瑟伴驚鴻癸夘逆風循西岸牽行可五里有江自東南出其大江與湘江等曰瀏陽江西岸有廟曰三沙牓曰武威王石刻乃天祐二年馬殷為馬援建而逺祖之也甲子晴無風發潭州循西岸牽行艤舟王公亭奠南嶽行祠㳺嶽麓升中洞真觀謁漢文帝廟嶽麓書院塔院大抵諸寺相隣惟升中寺􅆟髙宛轉登陟可百餘步門外小溪激射竹木其聲泠然稍稍露石角寺後有法華臺髙絶山頂晉僧法崇者箋法華經于此有杉槱數本其大如菌云陶士衡手植也王公亭湖民為王宰少卿所立洞真觀記云鄧固真人上昇之所潭州岳麓書院有孔子堂御書閣堂廡尚完清泉經流堂下景意極于瀟湘升中寺法華臺下有白鶴泉㳙㳙有聲味極甘冷橘洲湘江中南北與城等有巡檢司僧寺兩三所居民業漁者數百家景物􅆟為佳處秦少㳺死藤州其子護䘮藁殯潭州黃魯直有詩云長眠橘洲風雨寒丁卯晴無風抛東岸牽行五里許過車子磯西岸有小山回又行十里過昭潭其水澄湛如墨俗云傍通江南壬申自夜大雨順風行五里許水中多亂石三十里至昭靈灘有昭靈廟凡四灘皆行亂石中而復湍急自三門船上執色倡道皆土人謂之灘子舟人束手一不與焉官舟過者擊鼓呼之即時來集舟上至昭靈出灘方各捨去在湘中最為險處癸酉十月朔抛西岸十里許江轉自西來北望武口又三十里過青山磯臨岸培塿丙子如岳下出衡山縣西門長松髙下夾道三十餘里或云三十里松乃馬希蕚所植馬長而無髭遂禱於岳神種松而髭生丁丑陰朝謁嶽祠退季真君觀謁北門侍郎神位食後率檀宣義登山自嶽西渡小澗以轉軸轎子迤邐挽行路皆直上略無盤曲一轎至十餘夫方可舉而前可里許至石橋亦謂之石梯鑿成堦級長可二十餘歩必履而登之其石每在山之面蔽路鑿乃能通也其端有小寺可數楹謂之石橋寺乃遊人憇足之所主僧必具茶食又登陟可五里左之福巖右之南臺在福巖之下峰側架空為之制作竒巧殿堂皆板瓦宛轉下上始能及粤梁天監中惠海法師始開而居之其後六祖之徒惠遷卓庵於石上人謂之石頭和尚死謚無際大師塔號見裴休書牓尚在庭中有石如案乃無際落髪之所龎居士亦曽居之西隅有夀星殿内有木根如龜形有水泉涓涓寺衆仰給其源曰洗鉢池亦石頭故物也主僧維聖嘉州人居此十餘年質重可嘉戊子雨晚徃花藥山寺浴其山則在州城之南培塿竹木可周數百步其寺則居懐抱之中寺後有廽鴈峯髙可數百步俯見城邑其上有面嶽亭北望衡山之陽有如屏扆過陷池五里許至湯泉在澗底大如車輪熱不可插手稍稍下流始可盥濯浸溉田畝流數里左右山徑偪側略無興葺之地瘴嶺蠻溪亦有此泉渇飲猿鳥汙濯儂猺物同而其致異亦可嘆也過陷池嶺少南下有清池隠出山腹泓澄可二十畝即是也傳云昔有萬氏居此一日雷雨全家淪陷遂為此池故當時有謡言當陷萬家萬氏一家當之今嵗旱則以牛數十淘攪其中或能致雨郴之通惠禪師院有唐楊惠之手塑九子母一堂每軀自地坐立不以床具至於装繪采飾皆以純色不甚華彩開戸􅌶然觀者皆以為生動也嘉祐中大卿解程守郴率僚屬同觀程朴野士也見其生態俾其工以彩飾之又欲以俸錢作床坐而薦之以命主僧僧不從解怒欲加之罪僧曰喫棒不辭可惜壞了四百年手迹而損大卿好事之名解竟不能奪而止馬黙單州人氣幹老而不衰言廣西事甚詳熈寧中邕州未䧟覆常有怪異大蛇見若甕麄重八十斤食猪幾盡州衙㕔前井中白氣干霄蝴蝶無數飛集林木上不久䧟覆今復完葺然寺中泥佛手足常動城下鬱江舊潭濁土人云清則有兵今已清有二龜伏其下鱗甲皆可數曹谷能星厯數術言事如神為王欽若作知命書云七十年中一一加弄珠灘上貴堪誇碧油幢下聞啼鳥千日徴還上漢槎欽若七十二建節知襄州正得一千日召還又云周匝将臨壬戌嵗定鼎門前春色異一千日止少三還再入和羮宜盡瘁其後欽若判西京得七百日再入䘚於政府盡瘁病䘚乃壬戌嵗也又云臨去尚猶聞禁漏異姓嘉名在史書王死在京是時夜漏將盡無子女婿張瓌主後事又與馮拯作書云太常樂闋都門遇雪拯葬在劉太后喪中不給鹵簿是日大雪鬼門闗在山嶺上鑿石通路崖壁如削雖盛夏亦凛然寒凉擬金山在水中嶺岫崛起有類金山自餘亭榭基址甚多竹木侵雲游者竟日乃可盡也附郴學大成一則宋王沂公父雖不學問而酷好儒士每遇故紙必掇拾滌以香水嘗發願曰願我子孫以文學顯一夕夢宣聖撫其背曰汝敬吾教何其勤歟恨汝已老無可成就當遣曽參來汝家晩年果得一子乃沂公也因以曽字名之竟以狀元及第官至中書侍郎門下平章事封沂公
