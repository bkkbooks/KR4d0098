body:
  text: 畫墁集卷七宋張舜民撰郴行録丁丑拜雙廟即張巡許逺祠也宋人謂之五王廟兼南霽雲姚誾雷萬春而為五也五王廟詩清汴河邊五君子身遏橫流同日死火炎曾是及池魚世變安能顧妻子百尺髙城不足慿日月所照惟孤誠當其殺身際肯念身後名嗚呼伯夷既死孔子不復生身後是非誰與評乙酉率建安進士葉浮遊北郭劉氏園園多竒石乃符離土産有丈餘者紺潤詭怪非京師者所擬也辛卯次洪澤口過龜山寺辛奉議繼至同遊久之寺臨淮水負小山規制壯麗自京師以南寺觀皆不及也乃真廟所建佛殿三榜石曼卿書筆力徑健老僧清悠可語出畫佛一幀自云王維筆制作古妙雖非摩詰亦竒手所為也寺後山腳有石穴以磚塞其户俗云無支祈所宅也少南有長源公祠祠下臨水石色紺碧出沒舂激可愛龜山寺詩白塔搖搖波浪間幾多舟楫望禪關天邊幡影因心動堂上潮音到海還我拔一毛猶自苦師除雙臂信如間祥符中斷臂道者所居中流莫怪頻回首直到江南始見山壬辰次虹縣虹當為紅漢書所謂紅陽侯立是也訛而不改遂謂之虹城北有湖水廣袤十里蒲魚之饒周給鄰境煬帝幸江都賜名萬安湖比晚與辛大觀以小舟遊定林寺後遙絶湖心可十里至小洲有民居兩三家雞犬籬落四面渺茫過江渚既歸候都監蘇育供奉問郴州土風云乙未次泗州同年吳立禮承議相候丙申見發運副使蔣之竒知州朝奉劉士彥通判奉議王純中午間蔣之竒通判見候申後大聖見塔上始見香煙如霧籠閉四周少頃有物如拳許在相輪上或坐或作往來周旋不止每至東南角少佇立至暮不滅又自塔下煙霧如甑氣上騰少間雨作丁酉早霽以家詣塔下寺號普照王塔在一偏大聖面西座開鑰諦觀久之或云所見喜愠大小各異亦有竟不覩者塔間貨貝山積謁禮自遠至者常如市閧泗州劉士彥先自睦州通判替還京艤舟宿淮泗間岸次忽遇乞者年十七八目瑩而唇朱光彩可掬劉怪而問之異人曰吾賣豆每粒一貫二伯文足劉曰我適無錢止有所衣綿襖聊以當之如何乞曰固可也容取豆即以紙一幅於兩乳間擦摩之轉有烏豆數粒出取一粒與劉其餘擲汴水中劉欲吞之乞曰未也又以紙擦摩胸腋間復有菉豆數粒出又取一粒與劉其餘擲汴水劉即吞二粒畢與所許物乞人笑而不取劉始病蠱不能下食即食如初而益多今劉面色如丹然一嵗一發渴飲水數斗覺二豆腹中如棗大乞人曰後某年復相見於淮西不知如何也是日登寺閣眺望淮山有如圖畫閣之西南隅有塔影倒垂長可尺許以扇承之影在扇上僧云有時見二塔影也庚子晚霽與辛大觀涉淮南登山寺會景亭乃見臨淮形勝類蒲關寺後因山為方丈天然竒制盛夏凛然南北遊人刋志殆遍凡久居京師厭倦塵土乍爾登舟沿流已覺意思軒豁然汴岸荒疏無可觀覽未有超然清思及出汴入淮始見山水之勝厯目稍曠而適口鮮繁竟日之間遂忘遷流之懷也甲辰入運河艤舟洪澤間下見比目魚髙柳清渠寂無暑氣魚蝦蟹蛤日厭盤餐自是行運河矣辛大觀先行以此走寄同下龜山時舟行篙參差夜投洪澤口訪問失所之不應一日力解至淮隂祠長淮自風浪竟夕起憂疑旦日坐閘中聽水朝忘飢清泠見雜詠蓊密聞羣咿就柳喜髙蔭避橋嫌窄卑涼風吹水面襟袖不假披新螯與老鮭登俎輒無遺飽食却思睡睡起復何為稍厭理文字惟思弄孫兒尚有數舟酒獨酌非所宜好話不得吐兩日舌如茨舟行雖云樂先後不可期爭如鞍馬間吟嘯長追隨己酉至太平興國觀即唐九天採訪使者廟熙寧中册封應元保運真君開元十九年兆夢明皇即此立祠規制宏敞連亘溪谷階廡厨湢水流周環畫夜淙淙有聲玄宗手篆殿榜漆牌黑字金銅等身御容元豐所賜殿榜金字又為髹塗金扉以祕之常不得見又有賜泥金仙衣共三事至為華爛殿外階下有石一株曰劉仙石扣之即開劉仙自此出入監宮劉延式朝奉齊州人斷房十九年辟穀九年方六十一恬和自處裕如也言人未來事數驗辛亥同辛大觀遊楊氏園紫極宮皆山陽之勝是日見徐積先輩積山陽人為學志古養母盡力不置僕妾年四十不婚不仕食飲洗浣力役之事皆身為之不婚恐異姓不能盡心於母也不求仕恐一日去其親也久之鄉人敦迫使之就舉及應貢入京師以雙輪載母躬自行推葛衫草屨行道之人不能辨也治平四年許安世榜下及第未調官母亡遂不復仕窮居山陽衣食不給凡市買楚人不肯受其直積亦不取至有信宿不食者淮南學者宗之至路振通判楚州始為娶妻生子小名路兒云丁巳次召伯埭召伯為揚州為民築堰去後思之方之召公甘棠焉亦謂之棠堰祠宇存焉甲子同陳舅遊甘露寺寺俯大江踞崇岡金山焦山皆在指掌東眺海門北見揚州天下絶致也李衛公在浙西再加繕葺有文饒畫像手植柏佛殿兩牖門菩薩六軀世傳張僧繇筆菩薩二神一師子一世傳陸探微筆與豫家所藏天王筆小異庭間有大鐵鑊僧堂下有小鐵鑊二梁天監中所作砌下有石如蹲羊即狠石也世傳孫權劉備據此石以謀曹操前朝題記厯厯皆在主僧道敷頗淳固有理學題狠石詩江北江南一道兵匆匆據石各論情功成與爾遊滄海此語當初是至誠是日同陳舅遊延慶寺延慶即劉裕故宅有丹井壽丘在焉形勢盤固真異境也乙丑晚離潤州趨金山寺自南岸登小舟風雨暴作大浪如屋出沒於其中比達寺下已見燈矣丙寅大雨食罷登山頂江中風浪如萬羊齊奔寺在江心島上樓殿周匝可數百楹松竹疏翠望之如浮動南朝人謂之浮玉山其下即水府也大浪舂簸夜晴晝雨初若不安東望海門焦山出沒皆在海中也主僧了元者頗􅈺外學丈室燦然圖畫尺牘好玩之物莫不畢具又蓄孔雀能言之鳥數種因遍索古今題詠了不可得惟於化城閣棟間揭介甫兄弟兩詩而已又榜客位云官非文侍中才非李太白不請留題過者莫不大罵北人望南方宗門請方必謂人人了達方敢住院匡種既習其為人往往市㕓之不若也晚渡瓜洲夜泊運河旦至舟次金山貽了元詩何年靈鷲鳥飛落大江心石壁雖難轉風波不易禁樓臺分左右日月見浮沉便欲歸休庇長嗟世纍深己巳徐瓘承議丘朝奉辛大觀遊建隆寺九曲池登大明寺塔摘星樓故基望江南山水煙雨隱顯如圖畫酌水試茶井在茶經為第五品建隆寺即太祖濯征之地有御容香火殿九曲摘星皆前朝故迹大率今之所謂揚州者視故地東南一角無慮四分之一爾其唐室故地皆榛莾也胥浦河在揚州揚子縣一水縈回南入大江名曰胥浦河一日三潮俗曰伍子胥渡江解劔之所旁有子胥廟觀記之所載使者以像置舟潮水忽至日景方午至今此水有午潮也己丑立秋是夜風雨辛卯羣會食於後園丁酉陸彥回同年如金陵徐瓘承議至戊戌同徐承議遊儀真觀因過法雲寺伍子胥廟瞰江山尤為爽塏俗云此黥布寨地也至今耕者多得箭鏃徐見松上有鶴巢乃言昔李倕學士知晉州重葺堯廟俾縣尉者監督役事廟多古松上有鶴巢及宿枝喬然可愛李視事後每置酒其傍及府寮并尉公仰玩竟日一日尉獨念府公之重每置酒相勞顧鶴巢危綴茍為風吹墮無乃狼籍杯盤又標枝芽蘖不茂何足取觀乃命工以斧悉除之居無何李又至方銜杯仰首則無是二物怪而問尉具以情告嗟嘆久之為不懌而罷長蘆崇福院乃章憲太后為真宗所營制度宏麗甲冠江淮雖京師諸寺有所不及常安五百衆又僮僕數百日食千人主僧法秀秦州人語論精確持戒嚴整寺之內外未始見僧行往還盡日閴然如無人者實南方尊宿所推尚也庚戌發長蘆始循北岸行五里許即絶江至南岸下漾口循南岸行數里入新河口王介甫時為江寧所開新河其南有卑麓正類解梁南山稍稍南趣馬鞍山口有居民巡檢司復出大江少南循石頭城過清涼寺宛轉入秦淮北晚次江寧府始將離真州人多以涉江為戒比至長蘆南望渺溟誠可為懼及放舟乘風不踰食頃已達南岸介甫開新河以避欒家磯數十里風水甚為行舟之利然夾口土山屢崩嵗勤補葺方可經久石頭城者天生石壁有如城隅起夾口直至清涼寺金陵之為國大略自孫權城石頭謂之建業即今之覆舟山上也晉宋以來其臺城稍遷而南以就平坦尚在今之城北數里之內梁陳因之及李氏即營今之江寧跨踞淮水形勢始全夢得所謂山圍故國周遭在此不刋之句也兵火之迹宛然登覽之間使人悽愴不已鐵塔寺在城內天慶觀相連庭中有二鐵塔甚竒制也辛亥見知府待制陳繹通判何壽昌奉議提刑髙復大夫通判杜偉奉議范公共會於清心亭壬子六同年食于府園同年張琬與焉厯遍李氏後苑登髙齋望蔣山覆舟幕府諸山盡見金陵形勝大率今之衙城乃故內也府園即禁苑蔣山遇王安上同觀上方鍾山志公塔在鍾山之頂四面皆不相連屬自為一山形如覆鐘蔣山包懷在外迫近方見舊有志公刀尺帚李氏歸國太宗取致宮中既而出付啓聖院塔之所奉者非本物也乙卯遇劉顗宮苑遂遊長干寺登雨花臺髙座寺越王臺周處臺及升元寺保寧院長干寺在南門外東枕崇岡北瞰城邑自梁陳以來久廢李氏為散從官營本朝天禧中其地數有光怪真廟後營葺之寺後皆修竹長林下上凡數百步有髙亭四望又有靈濟夫人祠潭水湛然祈雨數應昔髙魁得銅像冶城張係網得金蓮座於江上董城獲大額珠於合浦三物並致於長干寺大小適當後有梵僧自天竺至鄴都失銅像中原擾亂因渡江至長干見銅像泣涕禮謁即有光異因言此阿育王第四女所制坐下有志驗之果然大業滅陳至武德中遷其像於上京光宅寺靈異極多唐末兵火不知所終髙座寺在長干之南迤邐登陟岡嶺蘭若甚幽大松修竹夾道而起超然出羣岡之上俯瞰都城人物可數西望江渚雲水杳然乃金陵絶勝之景吳仲庶作記案髙僧傳西域帛尸黎密多羅晉永嘉中始至中國值亂渡江居金陵建初中王導庾亮咸敬信之江左人呼為髙座所居曰髙座寺至咸康中葬於石子岡升元寺即瓦官寺在城內西南隅後踞崇岡前瞰江西城最為古迹然纍朝兵火略無倣佛李氏時升元閣猶在乃梁朝故物髙二百四十尺李白有詩云日月隱簷楹者是也丙辰雨同劉宮苑遊清涼寺在府城之北石頭之上下臨大江後附山麓規制宏敞山勢回合擁抱殿閣盛暑清涼因以名之自李氏歸朝之後金陵仍大火宮室民廬焚燬皆盡唯有小廳乃當時玉燭殿也與廳後修令閣二物獨存後苑養中堂即舊澄心堂故基戊午率董謀父登賞心亭賞心白鷺二亭相連南北對偶以扼淮口望煙渚杳無邊際白鷺蔡州皆在其下亦金陵設險之地也丁晉公登賞心亭以家藏袁安臥雪圖張挂之為屛風晉公既去未幾遂亡其圖繼來者又以布衣鄧淑所畫寒蘆野鴨圖充之今蘆鴨亦無有但紙糊粉堊而已甲子府中早食晚張琬同年飲子龍興寺所居詩云臺城風物已凄凄牢落行人邂逅齊秉燭相看如夢寐片帆回首又東西依依團扇秋仍好脈脈青娥恨却低一曲琵琶無限意時時間客思都迷丙寅同劉宮苑遊臺城寺觀辱井三品石三閣遺址晚就鐵塔寺具食臺城寺在府城內北附城堙隳圮殆不堪處即東宮故地也辱井在佛殿前深可尋丈上加石檻紅痕點染若胭脂俗云後主拉孔張二妃入井泣涕所沾也石檻上刻後主事八分小字極其精古乃大厯七年張署文頗詳為近年俗人題記刋刻所掩甚可惜也又有太和四年篆書可見者數字又舊聞臺城辱井石上有胭脂淚痕久未之信今見之似是淋漓塗抹之迹失笑不已因成此句平居已無奈倉卒故難任井上痕猶淺水中痕更深問鰲何至此下石爾甘心不及馬嵬襪猶能致萬金三品石在寺門外榛莽間即今園苑中怪石磊落竒詭各有尋丈亦為鄉中人鑿取之以焚灰剜缺為甚辛未發江寧出秦淮西南行順風循東南行小夾中左面卑麓勢如石頭比比有人煙十里過板橋店地形平曠行蘆葦可三十里出夾瀕大江過三山及十里至烈山祠即烈州也王濬庾亮泊舟之所五里過白土磯烈山下有響石擊之聲聞數里壬申旦出大江南岸小山甚秀五里許入慈湖夾東望山原髙下極類京口有巡檢司以西皆小山臨水可三十里出夾行大江趣東岸北夾極濶無異大江過采石磯望夫山其下即中水府也采石即牛渚磯也乃溫嶠然犀照水怪袁宏月夜艤舟之所北對和州江岸極狹本朝下南唐樊若水假為僧徒於此卓庵鑿石穴度量水面及大軍臨江用以為橋不差尺寸軍事獲濟今石鑿穴尚存丁丑登大信口出十許里過碣石磯風逆水急舟行極力循東岸數里過磯即平行十許里斥岸皆卑麓如壞城臨水可二十里過薤葉磯過光寧姑熟堂臨溪上制作宏麗江表諸郡無此亭後著李白畫像并十詠詩乃李白平生遊詠之地也西梁山前漢地理志所謂梁博望山亦謂之天門山李白有銘鐫于江亭宋沈慶之破臧質于此置梁山軍至李建中立雙廟於上南北岸各有巡檢司己卯發蕪湖循東岸而行數里拋西岸中有羣石拱起林樾蒼然曰蟂磯其上有若塔屋俗云有道人居其上過板子磯磯上紅黃絲花俯照江面花繁而石怪間以翠篠正如徐熙所畫者乃知藝之工者有本也詩云石上紅花低照水山頭翠篠細含煙天生一本徐熙畫祗欠鷓鴣相對眠辛巳發上口行十里許出大江循東南岸淺水五里入銅陵夾五里銅陵縣𨽻池州沿江牽行五里許上口少轉西望行過石人磯磯臨江隱起石理如側磚有石拱立逺望如人形過此上流坦然不見山阜壬午發銅陵逆風可五里許出大江南岸皆大山十餘里拋北岸少轉而西牽行可四十里復拋南岸次梅根港江流至此稍狹西岸上下廣輪數十里皆平陸良田極類北地東北望九華山見峯嶺勝于池州所見也癸未出大江逆風循東岸挽行可四十里入峽口又三四里入池州溪口宛轉行陂澤中可十餘里次池州弄水亭杜牧之所創俯溪流望齊山景致清絶人皆採為圖畫亭上石刻盡載小杜詩篇詩云清溪望處思悠悠不獨今人古亦愁借爾碧波明似鏡照豫白髮瑩如鷗江山自美騷人宅鐃鼓常催過客舟惟有角聲吹不斷斜陽橫起九峯樓甲申觀州宅有蕭相樓九華樓蕭相謂復也嘗為池州刺史裴度竇潏皆守土各有記述州宇前臨清溪規制古壯廳事頗雄近嵗吳仲庶滕元發皆葺新之江上諸郡皆不及也梁昭明太子以産魚味為可貴名可貴池在江邊洲島之上城無垣壘編竹為防井邑疏索然江山之麗下流諸郡皆不及也物産豐賤北人寄居甚多亦生理之便也戊子羣會於蕭相樓是夕中秋八月十五日夜清溪舟次詩云清溪水底月團圓因見中秋憶去年旱海五更霜透甲郴江萬里桂隨船昔看故國光常滿今望天涯勢似偏只恐姮娥應笑我還將隻影對嬋娟己丑與沈遼飲于齊山觀理浮橋謁余為齊山橋銘并引齊山有徑坑附寺之背深可尋丈濶倍之有事于山者越此乃可涉木久朽腐中間經遊者病焉元豐癸亥仲秋沈遼施橋張舜民為之銘曰阻不在大歸於閡利不在充志於通措此以往嘉無窮齊山在州城之南隔清溪可二里許背溪之陽不與大山相連東西可數里南北才一里髙可百步石色紺碧稜角隱顯百怪千狀正似人家所畜太湖石也竹木叢生其上有如塑畫寺居其陽山有二十九洞左史石燕白虎七頂觀音嵓小九華紫峯其著也乃李白杜牧及唐人素所遊息之地刺史齊照日居其中故以名焉左史在山東首自南麓緣山蹊可一里餘越嶺北下穿石罅石頗竒怪罄折入洞十步許稍低匍匐尋丈間又儻壯丈餘乃出一穴忽見天日四壁削髙可二十丈渾如甑形石色如黛女蘿樛葛遍其上亦名小洞天北嵓有刋志會昌六年刺史杜牧建安張祐書石石燕左史之西越嶺少下北嵓如覆杯可容百人有穴西出晝日石燕飛翔然捕者莫能得也左史已為沈遼所購石燕方鬻未售遼曰不過三數十緡可得爾欲豫售之白虎洞有石如虎蹲人不敢近也壬辰移舟出清溪次池口有人煙稅場距城四里許兩邊長松夾路云九里松也乙未微雨無風縴行可五里出夾入大江循西岸二十里至將軍堰拋東岸入鴈翅夾下口次上口是日逆風可行六十里雨至夜北有小龍王廟西對皖口即舒州路也丁酉行東岸勢類石頭城忽然天氣翳黑自北而南時頃開朗可三十里過祝家磯東流縣磯極為險惡是時秋深水落在夏潦最為難上己亥行山夾順風夾合大江東岸山小而近尤為秀拔西岸淮南界極望平曠過烽火磯山勢特然髙茂乃南朝於此置烽火以通上流征鎮也甲辰羣會於庾公之樓在衙城北庾亮鎮潯陽經始其事廢興久矣近嵗祖無擇頗葺新之俯瞰江湓南望廬阜北窮夢澤乃江國勝絶之地前人題之繼韻甚多罕見于今但比嵗數篇而已
