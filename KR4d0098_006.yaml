body:
  text: 畫墁集巻六宋張舜民撰記表劄子墓誌静勝齋記天下之事非一不靜則不能勝也故為齋居於堂之東隅南背通道北臨永巷有車馬之徃來市井之交易晨蹄夜響怒歌笑言相繼而作於外而聞於其中如是茍不以静勝之則不能處也非惟所處之為然也職亦有之夫法令繁多民犯者衆淺深重輕之際有所未明差若毫釐則陷平民於有罪生死見之於目慘怛形之於心俯而深思茍不以静處則不能也非惟所職之為然也憂亦有之吾君吾相游巖廊之下廟堂之上攬天下之萬務紛然有不勝理者則禮樂刑政安危治亂繫之於身將帥之士總師旅之衆奉征伐之事壁壘疆塲兩軍相持必有譎詐之謀間諜之士以徃來疑恐於其間則千萬人之性命寓之於一人居斯二者之際茍不能静勝之則不能全也故因其所居及其所職因其所職及其所憂自一室而及天下故曰天下之事非一不静則不能勝也齋有喬林脩竹冬榮夏實泝洄漣漪禽魚萍梗之戯可以恱目經史山積圗畫左右彈琴詠歌逍遥永日可以樂心居雖不寛裕如也然所謂静者其在於地乎在於人乎在於端居黙坐終日無事而已乎由是言之不在乎地而在乎人不在乎人而在乎平心也豳州亭口馬氏復田業記豳城之西一舍之地涇源之㑹同關隴之趾踵有墟曰亭口即古所謂豳亭者也有馬氏者實長其聚落然其産不及中人而常於士之有文行者屈致以禮使其子弟事而學焉當是時馬氏甚得譽於鄉人其學者有曰錫者曰房者於予之齒比肩也一日邑令語予曰宜禄之民無良生齒之籍二萬有畸兄弟同居者止馬氏一家君子由是知馬氏不獨謂之好事而友悌之行有過人者於所居之東有梁山之勝鑿山引水蒔稻稉開池沼菰蒲芰荷橋彴亭館鷗鷺之飛翔龜魚之潜躍春華秋實茂林修竹回環於數里之間行者止而不去居者樂而忘歸亦莫知其為江湖之大鄠杜之曲其後予游宦三十四年以事之涇源再過某處漠然無所覩惟荒草野田而已詢之居人則曰劵數易矣業屢改矣罷於力役弊於凶年當時青衿子佩之徒或為兵而徙邊或為農而易縣獨生錫者出枯槁憔悴殆不可識相與把袂歎息而已嵗在戊子子再過其處流者潏然滀者淵然為苖者茁然為植者蓊然耕者歌漁者詠柴荆之徃來雞犬之相聞前所謂飛翔潜躍之徒復集於其處恍然無異於平昔又激水為磨以紓鄉人之勞伐木為橋以利徃來之渉生復見予曰錫幸而未死盡力而得之豈期垂老之年復覩先人之業予曰此亦人生之難也傳曰農服先疇之甽畝為國者以復古為大為子者以克家為難亡而復得墜而復興求之古人亦鮮有矣予復語生曰頗記與子挾書䇿走博簺解而泅挃喉而歌與樵夫牧子接膝而醉争席而寢予之心力貌顔方之當日何如生曰弗如也予曰子之業固已復矣予之心力貌顔詎可復得耶言之悲夫屢歎而為之記房州修城碑隂記蜀人大抵善詞筆而少吏能眉山任師中嘗與予言吾蜀前軰有吏能者惟何聖從陳公弼二人而已小子不才敢出其後然師中之言亦自負爾何公予不及識治平末年予為岐府掾是時陳公去岐未乆竊嘗訪其行事大畧馭吏嚴察人不敢欺姦吏不敢欺則良民自安堵矣小大之牘罔不經目小則幕府大則自操筆為之常屬紙數幅使兩人持其端提筆歴歴書之理法皆備出人意表官吏以此服之是時蘓子瞻登制舉簽判府事實佐公其後子瞻亦自負吏事人或詰之乃曰吾得之陳公也崇寧癸未嵗予以罪責居房陵州隘陋無遊適之地或乘興登城以縱目獨怪是城矗矗言言而門觀隍塹一如邊壘皆有法度因念房居深山中土踈匠苦又安得至此哉乆之至南門得石表曰修城記乃是皇祐中草竊王論者嘯聚均房間朝廷自謫籍起陳公守房陵所為者迨今六七十年矣且諸邉城始非不工至六七十年有不圮者乎而茲城獨能如此夫城猶法也法者政事之所守人亡而守不廢者鮮矣故曰作事可法皆謂去乆之言也子瞻在岐與陳公不相叶至境上聞其來陳公以鄉里長老自處子瞻少年氣剛不少下子瞻後悔此事不喜人問之於是作陳公弼傳是亦補過之言云四賢堂碑隂記關梁莅事之三日例見吾孔子於學中既拜堂下又引而之東西序有偏坐者四焉其禮如見孔子舜民隂恠而問之典謁者曰此所謂四賢堂也敢問賢者為誰曰司馬遷王通韓愈桞宗元也前守兹土者既新吾學又取蒲人之有聞於後世者設堂侑之意使天下知蒲州人物之盛且以勉學者予歎曰河東人物自古冠天下莫尊於舜莫髙於伯夷叔齊介之推莫智於百里奚莫辯於司馬遷莫賢於王通莫富於猗頓莫盛於唐莫衰於今日至於二裴之功業三薛之學行張說之通才張廵吕子臧張介然之死莭陽城之敢諫王維司空圗之髙雅桞宗元韓愈之文章至於宗楚客裴延齡之險詖揚國忠妃子之寵遇門閥之家富貴之胄以至於一介一莭之士立身於當時名聞於後世者不可勝數夫何其盛哉觀其條華之所鎮臨河洛之所經㑹宜有靈氣孕竒育粹之不竭如東海之淵泰山之麗其所以為珠璣金貝楩楠豫章之貨者於兹出焉又何獨至於今日空虛索寞寂無人哉且學校之設所以教也教之大倫忠孝是也當孔子不得中道而與之雖㓗已之童子有常之人狂狷之士亦所不棄者欲以教也冉求一賦粟將鳴鼓而攻之欲以為教也教者取其材而為教者必責其成材則是四賢者皆成材也茍取其文章而略其德業則奈何其為教哉吾欲進裴度張廵陽城而退子厚以為六數合於聖人鳴鼓之義而患不能故書其碑之隂以告在學之徒若後之守土者代謝衣襖表氷沙更戍深軫於睿慈袍帶淪恩普延於列校趨承増激拜服知榮中謝恭惟皇帝陛下衣被羣生覆露四海視天下以猶已念一夫之予辜坐均安燠之仁遐及疆埸之旅禦寒風之慘勁豈曰無衣泳聖澤之汪洋皆如挾纊能使枕戈之士永肩衛社之心賀受玉璽表太平無象神器有歸照耀大庭鎮安萬國中賀竊以聖人之大寳曰位王者之受命於天何物傳流致之悠乆若荆山之璞史籀之文螭紐焜煌龍章飛動以世有汚隆之數故物存顯晦之時在昔江左之求今出咸陽之市惟聖人之在御無羽翼而致前井底土中常有神光之照夜金繩玉檢行刋舊典以升中此乃伏遇皇帝陛下德及淵泉化孚比屋修明五事式叙九圍豈期懐糈之餘親見受釐之盛望蓬萊之仗邈在於雲中求封禪之書必居於身後投進使遼録長城賦劄子臣近伏䝉聖慈差奉使大遼尋具辭免不獲俞允勘㑹昨於元祐九年差充回謝大遼弔祭宣仁聖烈皇后禮信使出疆徃來經渉彼土嘗取其耳目所得排日紀録因著為甲戍使遼録其始以備私居賔友燕言之助今偶塵聖選辭不免行因檢括舊牘此書尚在其間所載山川井邑道路風俗至於主客之語言龍庭之禮數亦可以備清閒之覽觀并長城賦一篇渉獵古今兼之風戒謹繕冩成冊副以縑幞隨状進呈雖塵凟睿明雅無誦訓之學僅得乘軺之畧亦所以見臣子區區原隰王事靡盬不遑啟處之意太尉張公守約墓銘公為涇州守涇民有親在而析居者公未至即毁劵合居曰無使張閣使來知有此也後有耋而跂者拜於庭問之曰孤貧無頼有弟貲富未嘗通假貸今遽見收養甚温由公之政故來謝遂呼其弟詰之則曰見人言張閣使獨惡不孝不弟者故爾公曰待我去後復棄兄乎曰至死不相離也因厚勞遣之
